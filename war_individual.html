<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>War Individual — UE Guild</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.32.0/plotly.min.js"></script>
<style>
  :root {
    --bg:     #080c10;
    --card:   #0e1117;
    --card2:  #141920;
    --border: #1e2533;
    --text:   #dce4f0;
    --muted:  #5a6a82;
    --blue:   #4f9cf9;
    --green:  #34d058;
    --red:    #f55555;
    --gold:   #e3a336;
    --purple: #a371f7;
    --cyan:   #39c5cf;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
  }
  h1,h2,h3,h4,h5 { font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: .02em; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .stat-card { text-align:center; padding:1.1rem .8rem; }
  .stat-num  { font-family:'Rajdhani',sans-serif; font-size:2rem; font-weight:700; line-height:1; }
  .stat-lbl  { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-top:.3rem; }
  .nav-bar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: .6rem 1.2rem;
    display: flex;
    align-items: center;
    gap: .5rem;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .nav-logo { font-family:'Rajdhani',sans-serif; font-size:1.2rem; font-weight:700; color:var(--gold); white-space:nowrap; }
  .nav-pill {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .3rem .75rem;
    text-decoration: none;
    color: var(--muted);
    font-size: .78rem;
    transition: all .18s;
  }
  .nav-pill:hover { border-color:var(--blue); color:var(--blue); background:rgba(79,156,249,.07); }
  .nav-pill.active { background:var(--blue); color:#fff; border-color:var(--blue); }
  .ts { font-size:.7rem; color:var(--muted); margin-left:auto; white-space:nowrap; }
  .sec-hdr { border-bottom:1px solid var(--border); padding-bottom:.5rem; margin-bottom:1.2rem; }
  .badge-ok  { background:rgba(52,208,88,.15);  color:var(--green);  border:1px solid rgba(52,208,88,.4);  border-radius:4px; padding:1px 8px; font-size:.72rem; }
  .badge-no  { background:rgba(245,85,85,.15);  color:var(--red);    border:1px solid rgba(245,85,85,.4);  border-radius:4px; padding:1px 8px; font-size:.72rem; }
  .table { color:var(--text); margin-bottom:0; }
  .table th  { color:var(--muted); font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; border-color:var(--border); font-weight:500; }
  .table td  { border-color:var(--border); font-size:.83rem; vertical-align:middle; }
  .table tbody tr:hover { background:rgba(79,156,249,.05); }
  .search-input {
    background:var(--card2); border:1px solid var(--border); border-radius:7px;
    padding:.45rem .9rem; color:var(--text); width:100%; font-size:.85rem;
  }
  .search-input:focus { outline:none; border-color:var(--blue); }
  .member-row {
    border:1px solid var(--border); border-radius:8px; padding:.5rem .8rem;
    cursor:pointer; transition:border-color .15s; margin-bottom:.4rem;
    display:flex; align-items:center; justify-content:space-between; gap:.5rem;
    background:var(--card);
  }
  .member-row:hover { border-color:var(--blue); background:rgba(79,156,249,.05); }
  .member-row.selected { border-color:var(--blue); background:rgba(79,156,249,.1); }
  .progress-bar-outer { background:#1a2233; border-radius:4px; height:7px; flex:1; overflow:hidden; }
  .empty-state { text-align:center; padding:3rem 1rem; color:var(--muted); }
  .empty-state .icon { font-size:3rem; margin-bottom:.8rem; }
</style>
</head>
<body>
<nav class="nav-bar">
  <span class="nav-logo">⚔️ UE Guild</span>
  <a href="index.html" class="nav-pill">🏠 Home</a>
  <a href="hunt_general.html" class="nav-pill">🎯 Hunt General</a>
  <a href="hunt_individual.html" class="nav-pill">👤 Hunt Individual</a>
  <a href="war_general.html" class="nav-pill">🏰 War General</a>
  <a href="war_months.html" class="nav-pill">📅 War Monthly</a>
  <a href="war_individual.html" class="nav-pill active">📈 War Individual</a>
  <span class="ts" id="ts-top">🕒 Loading...</span>
</nav>

<div class="container-fluid px-3 px-md-4 py-4 pb-5" id="main-container" style="display:none;">
<div class="row g-4">
  <div class="col-md-4 col-xl-3" style="max-width:320px;">
    <div class="card p-3 h-100" style="max-height:85vh;overflow-y:auto;">
      <h3 class="sec-hdr" style="font-size:1.1rem;margin-bottom:.8rem;">🔍 Members (<span id="m-count">0</span>)</h3>
      <input type="text" id="srch" class="search-input mb-3" placeholder="Search member...">
      <div id="m-list"></div>
    </div>
  </div>

  <div class="col-md-8 col-xl-9">
    <div id="content-pane" style="display:none;">
      <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">
        <h1 style="font-size:2.2rem;margin-bottom:0;" id="m-title">Member</h1>
      </div>
      
      <div class="row g-3">
        <div class="col-xl-7">
          <div class="card p-3 mb-3"><div id="c-pow" style="height:320px;"></div></div>
          <div class="card p-3"><div id="c-kil" style="height:320px;"></div></div>
        </div>
        <div class="col-xl-5">
          <div class="card p-3">
            <h4 style="font-size:1.1rem;margin-bottom:1rem;color:var(--text);">📅 Recorded Snapshots</h4>
            <div style="max-height:600px;overflow-y:auto;padding-right:8px;">
              <table class="table table-sm" id="t-hist">
                <thead><tr><th>Date</th><th>Power</th><th>Kills</th></tr></thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div id="empty-pane" class="card mt-2">
      <div class="empty-state">
        <div class="icon">🔍</div>
        <h4 style="color:var(--text)">Select a member</h4>
        <p style="margin-bottom:0;">Choose a member from the sidebar to view their history.</p>
      </div>
    </div>
  </div>
</div>
</div>

<script>
const THEME = {
  paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
  font: { color: '#dce4f0', family: 'Inter, sans-serif', size: 11 },
  xaxis: { gridcolor: '#1e2533', color: '#5a6a82', linecolor: '#1e2533', zerolinecolor: '#1e2533' },
  yaxis: { gridcolor: '#1e2533', color: '#5a6a82', linecolor: '#1e2533', zerolinecolor: '#1e2533' },
  margin: { t: 42, l: 45, r: 18, b: 65 }
};
const cfg = { responsive: true, displayModeBar: false };
function lay(title, xl='', yl='', extra={}) {
  return { ...THEME, title: { text: title, font: { color: '#dce4f0', size: 14, family: 'Rajdhani, sans-serif' } },
           xaxis: { ...THEME.xaxis, title: xl, tickformat: '' },
           yaxis: { ...THEME.yaxis, title: yl }, ...extra };
}

let DATA = null;

fetch('data/war_individual_data.json')
  .then(r => r.json())
  .then(d => {
    DATA = d;
    document.getElementById('main-container').style.display = 'block';
    document.getElementById('ts-top').textContent = '🕒 ' + d.generated_at;
    document.getElementById('m-count').textContent = d.members.length;
    renderSidebar();
    
    document.getElementById('srch').addEventListener('input', renderSidebar);
    
    if(d.members.length > 0) show(0);
  })
  .catch(e => {
    console.error(e);
    document.getElementById('ts-top').textContent = '⚠️ Error loading data';
  });

function renderSidebar() {
  const q = document.getElementById('srch').value.toLowerCase();
  let html = '';
  DATA.members.forEach((m, ix) => {
    if(m.name.toLowerCase().includes(q)) {
      html += `<div class="member-row" id="row-${ix}" onclick="show(${ix})">
        <span style="font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${m.name}">${m.name}</span>
        <span style="color:var(--muted);font-size:.75rem;">${m.snapshots.length} dates</span>
      </div>`;
    }
  });
  document.getElementById('m-list').innerHTML = html;
}

function show(idx) {
  document.querySelectorAll('.member-row').forEach(n => n.classList.remove('selected'));
  const row = document.getElementById(`row-${idx}`);
  if(row) row.classList.add('selected');
  
  document.getElementById('empty-pane').style.display = 'none';
  document.getElementById('content-pane').style.display = 'block';
  
  const m = DATA.members[idx];
  document.getElementById('m-title').textContent = m.name;
  
  const snaps = m.snapshots;
  if(snaps && snaps.length > 0) {
    const dates = snaps.map(s => s.date);
    const pows = snaps.map(s => s.might);
    const kils = snaps.map(s => s.kills);
    
    Plotly.newPlot('c-pow',[{
      type:'scatter', mode:'lines+markers', x:dates, y:pows,
      line:{color:'#e3a336',width:3}, marker:{size:5},
      fill:'tozeroy', fillcolor:'rgba(227,163,54,.1)'
    }], lay('Power History','Date','Power'), cfg);
    
    Plotly.newPlot('c-kil',[{
      type:'scatter', mode:'lines+markers', x:dates, y:kils,
      line:{color:'#f55555',width:3}, marker:{size:5},
      fill:'tozeroy', fillcolor:'rgba(245,85,85,.1)'
    }], lay('Kills History','Date','Kills'), cfg);
    
  } else {
    document.getElementById('c-pow').innerHTML = '<div class="empty-state"><div class="icon">📭</div>No historical data</div>';
    document.getElementById('c-kil').innerHTML = '<div class="empty-state"><div class="icon">📭</div>No historical data</div>';
  }
  
  let html = '';
  // Show newest first
  [...snaps].reverse().forEach(s => {
    const clsPow = s.might_diff >= 0 ? 'color:var(--green)' : 'color:var(--red)';
    const clsKil = s.kills_diff >= 0 ? 'color:var(--green)' : 'color:var(--red)';
    html += `<tr>
      <td style="font-size:.75rem;color:var(--muted);white-space:nowrap">${s.date}</td>
      <td>
        <div style="font-weight:600;">${s.might_str}</div>
        <div style="font-size:.7rem;${clsPow}">${s.might_diff_str}</div>
      </td>
      <td>
        <div style="font-weight:600;">${s.kills_str}</div>
        <div style="font-size:.7rem;${clsKil}">${s.kills_diff_str}</div>
      </td>
    </tr>`;
  });
  document.querySelector('#t-hist tbody').innerHTML = html;
}
</script>
</body>
</html>
