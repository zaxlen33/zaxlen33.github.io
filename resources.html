<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Admin Resource Command Generator — generate bot commands for guild member resources.">
  <title>Resources · UE Guild Dashboard</title>
  <link rel="stylesheet" href="./css/styles.css">
  <script src="./js/i18n.js"></script>
</head>
<body>

  <!-- nav.js injects sidebar + topbar here -->

  <!-- ── Page Content ── -->
  <main class="container">
    <div class="page-header">
      <h1 data-i18n="resources_title">📦 Resources</h1>
      <p data-i18n="resources_desc">Search for a guild member and click a resource type to instantly copy the admin bot command to your clipboard.</p>
    </div>

    <div id="resources-container">
      <div class="loading-state">
        <div class="spinner"></div>
        <p data-i18n="loading_members">Loading members directory…</p>
      </div>
    </div>
  </main>

  <!-- Toast notification (global, outside main) -->
  <div id="res-toast" class="res-toast" aria-live="polite" aria-atomic="true"></div>

  <footer class="footer">
    <div class="container" data-i18n="footer_text">
      UE Guild Dashboard · Data updated via Telegram Bot · All rights reserved
    </div>
  </footer>

  <script src="./js/nav.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/resources.js"></script>
</body>
</html>
