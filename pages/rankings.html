<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Guild rankings — top members by power, kills, and recent performance.">
  <title>Rankings · UE Guild Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/rankings.css">
  <script src="../js/i18n.js"></script>
</head>
<body>
  <!-- nav.js injects sidebar + topbar -->
  <main class="container">
    <div class="page-header">
      <h1 data-i18n="nav_rankings">🏆 Guild Rankings</h1>
      <p data-i18n="rankings_desc">Top members by power, kills, and recent name changes.</p>
    </div>
    <div id="rankings-container">
      <div class="loading-state"><div class="spinner"></div><p data-i18n="loading_rankings">Loading ranking data…</p></div>
    </div>
  </main>
  <footer class="footer"><div class="container" data-i18n="footer_text">UE Guild Dashboard · Data updated via Telegram Bot</div></footer>
  <script src="../js/nav.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/rankings.js"></script>

</html>
