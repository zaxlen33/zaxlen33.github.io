<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Weekly hunt performance — player kills, points, and goal completion rates.">
  <title>Hunt Reports · UE Guild Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/i18n.js"></script>
</head>
<body>
  <!-- nav.js injects sidebar + topbar -->
  <main class="container">
    <div class="page-header">
      <h1 data-i18n="nav_hunt">🦅 Hunt Reports</h1>
      <p data-i18n="hunt_desc">Weekly hunt performance — player kills, points, and goal completion rates.</p>
    </div>
    <div id="hunt-list-view">
      <div class="loading-state"><div class="spinner"></div><p data-i18n="loading_hunt">Loading hunt reports…</p></div>
    </div>
    <div id="hunt-detail-view" style="display:none;">
      <div class="loading-state"><div class="spinner"></div><p data-i18n="loading_hunt_data">Loading hunt data…</p></div>
    </div>
  </main>
  <footer class="footer"><div class="container" data-i18n="footer_text">UE Guild Dashboard · Data updated via Telegram Bot</div></footer>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
