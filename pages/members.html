<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Guild member directory — current power, kills, rank and detailed profiles.">
  <title>Check Members · UE Guild Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/i18n.js"></script>
</head>
<body>
  <!-- nav.js injects sidebar + topbar -->
  <main class="container">
    <div class="page-header">
      <h1 data-i18n="nav_members">👥 Check Member</h1>
      <p data-i18n="members_desc">Current power, kills, and rank for all guild members. Click <strong>View Profile</strong> to see all charts.</p>
    </div>
    <div id="members-container">
      <div class="loading-state"><div class="spinner"></div><p data-i18n="loading_members">Loading members directory…</p></div>
    </div>
  </main>
  <footer class="footer"><div class="container" data-i18n="footer_text">UE Guild Dashboard · Data updated via Telegram Bot</div></footer>
  <script src="../js/nav.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
