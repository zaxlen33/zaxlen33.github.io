<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Weekly guild war reports — guild power, kills, and growth tracking.">
  <title>War Reports · UE Guild Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/i18n.js"></script>
</head>
<body>
  <!-- nav.js injects sidebar + topbar -->
  <main class="container">
    <div class="page-header">
      <h1 data-i18n="nav_war">🏰 War Reports</h1>
      <p data-i18n="war_desc">Weekly guild war data — guild power, kills, and growth tracking across 52 weeks.</p>
    </div>
    <div id="war-list-view">
      <div class="loading-state"><div class="spinner"></div><p data-i18n="loading_dashboard">Loading war reports…</p></div>
    </div>
    <div id="war-detail-view" style="display:none;">
      <div class="loading-state"><div class="spinner"></div><p data-i18n="loading_data">Loading report…</p></div>
    </div>
  </main>
  <footer class="footer"><div class="container" data-i18n="footer_text">UE Guild Dashboard · Data updated via Telegram Bot</div></footer>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
