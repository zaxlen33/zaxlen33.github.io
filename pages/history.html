<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All History · UE Guild Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/i18n.js"></script>
</head>
<body>
  <!-- nav.js injects sidebar + topbar -->
  <main class="container">
    <div class="page-header">
      <h1 data-i18n="nav_history">📈 All History</h1>
      <p data-i18n="history_desc">Weekly power &amp; kills history for all members — up to 52 weeks. Click a member to view their charts.</p>
    </div>
    <div id="history-container">
      <div class="loading-state"><div class="spinner"></div><p data-i18n="loading_history">Loading history data…</p></div>
    </div>
  </main>
  <footer class="footer"><div class="container" data-i18n="footer_text">UE Guild Dashboard · Data updated via Telegram Bot</div></footer>
  <script src="../js/nav.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
