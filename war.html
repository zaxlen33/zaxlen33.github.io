<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>War Reports · UE Guild Dashboard</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <!-- ── Navigation ── -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">
        <span class="logo">🏰</span>
        <span>UE Guild <span>Dashboard</span></span>
      </div>
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
      <ul class="navbar-nav">
        <li><a href="./index.html">🏠 Home</a></li>
        <li><a href="./war.html">🏰 War</a></li>
        <li><a href="./hunt.html">🦅 Hunt</a></li>
        <li><a href="./tasks.html">🎯 Tasks</a></li>
        <li><a href="./rankings.html">🏆 Rankings</a></li>

        <li><a href="./members.html">👥 Check Member</a></li>
      </ul>
    </div>
  </nav>

  <!-- ── Page Content ── -->
  <main class="container">
    <div class="page-header">
      <h1>🏰 War Reports</h1>
      <p>Monthly guild war data — member might, kills, and growth tracking.</p>
    </div>

    <!--
      Both views are always present in the DOM.
      app.js shows/hides them based on URL hash:
        war.html       → list view
        war.html#2026-03 → detail view for that month

      FIX NOTE: Data is ALWAYS fetched fresh from ./data/wars.json.
      This ensures it works on GitHub Pages regardless of navigation method.
    -->

    <!-- List view (no hash) -->
    <div id="war-list-view">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading war reports…</p>
      </div>
    </div>

    <!-- Detail view (hash present) -->
    <div id="war-detail-view" style="display:none;">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading report…</p>
      </div>
    </div>

  </main>

  <footer class="footer">
    <div class="container">
      UE Guild Dashboard · Data updated via Telegram Bot
    </div>
  </footer>

  <script src="./js/app.js"></script>
</body>
</html>
