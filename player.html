<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Individual player profile — detailed power, kills, and hunt performance charts.">
  <title>Player Profile · UE Guild</title>
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./js/i18n.js"></script>
  <style>
    .chart-container { position: relative; height: 300px; width: 100%; }
    .profile-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; background: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--accent-blue); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 700; color: #fff; text-transform: uppercase; flex-shrink: 0; }
    .profile-info h1 { margin: 0 0 5px 0; font-size: 2rem; color: var(--text-primary); display: flex; align-items: center; flex-wrap: wrap; }
    .profile-info p { margin: 0; color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.95rem; }
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; }
    @media (max-width: 768px) {
      .charts-grid { grid-template-columns: 1fr; }
      .profile-header { padding: 1rem; gap: 0.8rem; }
      .profile-avatar { width: 60px; height: 60px; font-size: 1.8rem; }
      .profile-info h1 { font-size: 1.4rem; }
      .profile-info p { font-size: 0.82rem; }
    }
    @media (max-width: 480px) {
      .profile-header { flex-direction: column; text-align: center; }
      .profile-avatar { width: 56px; height: 56px; font-size: 1.5rem; }
      .profile-info h1 { font-size: 1.2rem; justify-content: center; }
      .profile-info p { font-size: 0.78rem; }
    }
  </style>
</head>
<body>

  <!-- nav.js injects sidebar + topbar -->

  <!-- ── Page Content ── -->
  <main class="container">
    <div id="player-container">
      <div class="loading-state">
        <div class="spinner"></div>
        <p data-i18n="loading_player">Loading player data…</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container" data-i18n="footer_text">
      UE Guild Dashboard · Data updated via Telegram Bot
    </div>
  </footer>

  <script src="./js/nav.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/player.js"></script>
</body>
</html>
